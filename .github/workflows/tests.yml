name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # pyspark is an optional, Java-backed dependency that the test suite does not
        # exercise (imports are guarded by tidyverse/_optional_pyspark.py), so it is
        # intentionally omitted here to keep the matrix fast and installable on 3.14.
        run: |
          python -m pip install --upgrade pip
          pip install pandas pytest more-itertools natsort python-dateutil pytz

      - name: Run tests
        run: pytest test/
